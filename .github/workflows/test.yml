name: CI

on:
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "eslint.config.js"
      - "prettier.config.mjs"
      - ".github/workflows/test.yml"
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @upstash/context7-mcp lint:check

      - name: Format
        run: pnpm --filter @upstash/context7-mcp format:check

      - name: Build
        run: pnpm --filter @upstash/context7-mcp build

      - name: Typecheck
        run: pnpm --filter @upstash/context7-mcp typecheck

      - name: Test local MCP
        run: pnpm --filter @upstash/context7-mcp test

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level low
